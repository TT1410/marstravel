<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./images/bus.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D1B2A" />
  <title>Mars Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:       #E8973A;
      --amber-light: #F5C06A;
      --amber-glow:  rgba(232,151,58,.35);
      --navy:        #0D1B2A;
      --cream:       #FAF4EA;
      --cream-dark:  #F2E9D8;
      --text:        #1E1208;
      --muted:       #5D4A38;
      --border:      rgba(0,0,0,.09);
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left,   0px);
      --safe-right:  env(safe-area-inset-right,  0px);
    }

    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'Raleway', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    a { -webkit-tap-highlight-color: transparent; }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: calc(var(--safe-top) + 13px) 18px 13px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(to bottom, rgba(13,27,42,.82) 0%, transparent 100%);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--amber);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 14px var(--amber-glow);
    }
    .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: #fff;
      letter-spacing: .05em;
      text-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .logo-text span { color: var(--amber-light); }

    /* language switcher */
    .lang-switcher {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }
    .lang-btn {
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.75);
      font-family: 'Raleway', sans-serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 5px 9px;
      border-radius: 7px;
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s;
      /* big enough tap target */
      min-height: 34px;
      -webkit-tap-highlight-color: transparent;
      text-transform: uppercase;
    }
    .lang-btn.active,
    .lang-btn:active {
      background: var(--amber);
      border-color: var(--amber);
      color: #fff;
    }
    @media (hover: hover) {
      .lang-btn:hover:not(.active) {
        background: rgba(255,255,255,.22);
        color: #fff;
      }
    }

    /* ══════════════════════════════
       SLIDER
    ══════════════════════════════ */
    .slider {
      position: relative;
      width: 100%;
      height: 78vmax;
      min-height: 340px;
      max-height: 540px;
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
    }
    @media (min-width: 768px) {
      .slider { height: 100vh; max-height: none; }
    }

    .slides-track {
      display: flex;
      height: 100%;
      will-change: transform;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
    }
    .slide {
      position: relative;
      min-width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .slide::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(170deg,
        rgba(13,27,42,.7) 0%,
        rgba(13,27,42,.1) 45%,
        rgba(13,27,42,.72) 100%);
    }
    .slide:nth-child(1) { background-image: url("images/auto-bus.png"); }
    .slide:nth-child(2) { background-image: url('https://images.unsplash.com/photo-1552482496-3c03befc5c25?w=2340&q=80'); }
    .slide:nth-child(3) { background-image: url('https://images.unsplash.com/photo-1570480264500-7a8356c3db4a?w=2370&q=80'); }
    .slide:nth-child(4) { background-image: url('https://images.unsplash.com/photo-1661406904719-98b9b35291ea?w=2148&q=80'); }
    .slide:nth-child(5) { background-image: url('https://images.unsplash.com/photo-1652910031688-b95c80510f69?w=2148&q=80'); }

    .slide-caption {
      position: absolute;
      bottom: 56px; left: 18px; right: 18px;
      z-index: 10; color: #fff;
    }
    @media (min-width: 768px) {
      .slide-caption { left: 56px; right: 38%; bottom: 100px; }
    }
    .slide-caption .label {
      font-size: .6rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--amber-light); margin-bottom: 7px;
    }
    .slide-caption h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.3rem, 5vw, 2.8rem);
      line-height: 1.2;
      text-shadow: 0 2px 18px rgba(0,0,0,.55);
    }

    .dots {
      position: absolute;
      bottom: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex; gap: 8px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,.4);
      border: none; cursor: pointer; padding: 0;
      position: relative;
      transition: background .3s, transform .3s;
    }
    .dot::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; }
    .dot.active { background: var(--amber); transform: scale(1.5); }

    .progress-bar {
      position: absolute; bottom: 0; left: 0;
      height: 3px; background: var(--amber);
      width: 0%; z-index: 20;
      transition: width 5s linear;
    }

    /* ══════════════════════════════
       PHONE STRIP
    ══════════════════════════════ */
    .phone-strip {
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 18px;
    }
    .phone-strip-label {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
    }
    /* На мобільному — стовпець, на ширших — рядок */
    .phone-strip-numbers {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    @media (min-width: 560px) {
      .phone-strip-numbers {
        flex-direction: row;
        justify-content: center;
        gap: 4px 8px;
        flex-wrap: wrap;
      }
      .phone-dot { display: flex; }
    }
    .phone-strip-numbers a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      transition: color .2s;
      white-space: nowrap;
      /* мінімум 48px tap target за висотою */
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .phone-strip-numbers a:active { color: var(--amber-light); }
    @media (hover: hover) { .phone-strip-numbers a:hover { color: var(--amber-light); } }
    .phone-icon {
      width: 28px; height: 28px;
      background: var(--amber);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 10px var(--amber-glow);
    }
    /* Крапки видно лише в рядковому режимі */
    .phone-dot {
      display: none;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,.3);
      flex-shrink: 0;
    }
    @media (min-width: 768px) {
      .phone-strip-numbers a { font-size: 1.1rem; }
    }

    /* ══════════════════════════════
       ABOUT
    ══════════════════════════════ */
    .about { padding: 36px 18px 28px; }
    @media (min-width: 768px) {
      .about {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 56px;
        max-width: 1160px;
        margin: 0 auto;
        padding: 68px 48px 52px;
        align-items: start;
      }
    }

    .section-label {
      font-size: .62rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--amber); margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after {
      content: ''; width: 28px; height: 1.5px;
      background: var(--amber); flex-shrink: 0;
    }

    .about-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.65rem, 5.5vw, 2.85rem);
      line-height: 1.12; color: var(--navy); margin-bottom: 16px;
    }
    .about-left h1 em { font-style: normal; color: var(--amber); }

    .about-left p {
      font-size: .93rem; line-height: 1.85;
      color: var(--muted); margin-bottom: 12px; font-weight: 300;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; margin-top: 22px;
      padding-top: 20px; border-top: 1px solid var(--border);
    }
    .stat {
      text-align: center; background: var(--cream-dark);
      border-radius: 12px; padding: 12px 6px;
    }
    .stat strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.35rem, 4vw, 2rem);
      color: var(--navy); line-height: 1; margin-bottom: 4px;
    }
    .stat span {
      font-size: .58rem; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted); font-weight: 600;
    }

    .about-right { margin-top: 28px; }
    @media (min-width: 768px) { .about-right { margin-top: 0; } }

    .feature-list { list-style: none; }
    .feature-list li {
      display: flex; align-items: flex-start; gap: 13px;
      padding: 14px 0; border-bottom: 1px solid var(--border);
      font-size: .89rem; line-height: 1.55; color: var(--muted);
    }
    .feature-list li:first-child { border-top: 1px solid var(--border); }
    .feature-list li strong { display: block; color: var(--text); margin-bottom: 2px; font-size: .92rem; }
    .feat-icon {
      width: 40px; height: 40px; min-width: 40px; border-radius: 11px;
      background: linear-gradient(135deg, var(--amber), var(--amber-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; box-shadow: 0 3px 10px var(--amber-glow);
    }

    /* ══════════════════════════════
       SOCIALS
    ══════════════════════════════ */
    .socials-section {
      background: var(--navy);
      padding: 48px 18px calc(48px + var(--safe-bottom));
      text-align: center;
    }
    @media (min-width: 768px) { .socials-section { padding: 68px 48px; } }

    .socials-section .section-label { justify-content: center; color: var(--amber-light); }
    .socials-section .section-label::after { display: none; }

    .socials-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 5.5vw, 2.4rem);
      color: #fff; margin-bottom: 10px;
    }
    .socials-section > p {
      color: rgba(255,255,255,.48); font-size: .87rem;
      font-weight: 300; margin-bottom: 36px;
      max-width: 340px; margin-left: auto; margin-right: auto; line-height: 1.65;
    }

    .social-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px; max-width: 430px; margin: 0 auto;
    }
    @media (min-width: 560px) {
      .social-grid {
        display: flex; flex-wrap: wrap;
        justify-content: center; gap: 12px; max-width: 820px;
      }
    }

    .social-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 9px; padding: 0 18px; height: 56px;
      border-radius: 14px; text-decoration: none;
      font-weight: 700; font-size: .88rem;
      letter-spacing: .02em; color: #fff;
      position: relative; overflow: hidden;
      transition: transform .14s ease, box-shadow .14s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .social-btn::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,.13); opacity: 0; transition: opacity .2s;
    }
    .social-btn:active { transform: scale(.95); }
    .social-btn:active::before { opacity: 1; }
    @media (hover: hover) {
      .social-btn:hover { transform: translateY(-4px) scale(1.02); }
      .social-btn:hover::before { opacity: 1; }
    }
    .social-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

    .btn-facebook  { background: #1877F2; box-shadow: 0 5px 18px rgba(24,119,242,.45); }
    .btn-instagram { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); box-shadow: 0 5px 18px rgba(220,39,67,.42); }
    .btn-tiktok    { background: #010101; box-shadow: 0 5px 18px rgba(0,0,0,.55); border: 1.5px solid #2a2a2a; }
    .btn-telegram  { background: #26A5E4; box-shadow: 0 5px 18px rgba(38,165,228,.42); }
    .btn-whatsapp  { background: #25D366; box-shadow: 0 5px 18px rgba(37,211,102,.38); }
    .btn-viber     { background: #7360F2; box-shadow: 0 5px 18px rgba(115,96,242,.42); }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    footer {
      background: #07111C;
      padding: 18px 18px calc(18px + var(--safe-bottom));
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 5px;
    }
    @media (min-width: 768px) {
      footer { flex-direction: row; justify-content: space-between; padding: 24px 48px; text-align: left; }
    }
    .footer-logo { font-family: 'Playfair Display', serif; color: #fff; font-size: 1rem; letter-spacing: .05em; }
    .footer-logo span { color: var(--amber-light); }
    footer p { color: rgba(255,255,255,.27); font-size: .7rem; font-weight: 300; }
  </style>
</head>

/* ══════════════════════════════════════════
   i18n engine
══════════════════════════════════════════ */
let currentLang = 'uk';

function applyLang(lang) {
  const t = TRANSLATIONS[lang];
  if (!t) return;
  currentLang = lang;

  document.documentElement.lang = t.htmlLang;
  document.title = t.pageTitle;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  document.querySelectorAll('.lang-btn').forEach(btn => {
    const active = btn.dataset.lang === lang;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });

  try { localStorage.setItem('marsLang', lang); } catch(_) {}
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

/* init — system language detection → saved preference → fallback 'uk' */
(function() {
  const SUPPORTED = ['uk', 'ro', 'en'];

  /* map of language-tag prefixes → our locale */
  const LANG_MAP = {
    uk: 'uk',                          // Ukrainian
    ro: 'ro', mo: 'ro',               // Romanian (+ Moldovan legacy tag)
    en: 'en',                          // English
  };

  /* walk navigator.languages (full ordered list) looking for first match */
  function detectSystemLang() {
    const list = Array.from(navigator.languages || [navigator.language || '']);
    for (const tag of list) {
      const prefix = tag.toLowerCase().split(/[-_]/)[0];
      if (LANG_MAP[prefix]) return LANG_MAP[prefix];
    }
    return 'uk'; // default
  }

  /* saved pref wins only if user explicitly clicked a button before */
  let saved;
  try { saved = localStorage.getItem('marsLang'); } catch(_) {}

  const preferred = (saved && SUPPORTED.includes(saved)) ? saved : detectSystemLang();
  applyLang(preferred);
})();

/* ══════════════════════════════════════════
   SLIDER
══════════════════════════════════════════ */
const track      = document.getElementById('track');
const dotsWrap   = document.getElementById('dots');
const progressEl = document.getElementById('progress');
const slides     = Array.from(track.children);
const TOTAL      = slides.length;
let current      = 0;
let timer;

slides.forEach((_, i) => {
  const btn = document.createElement('button');
  btn.className = 'dot' + (i === 0 ? ' active' : '');
  btn.setAttribute('aria-label', 'Slide ' + (i + 1));
  btn.addEventListener('click', () => goTo(i, true));
  dotsWrap.appendChild(btn);
});
const dots = dotsWrap.querySelectorAll('.dot');

function goTo(index, resetTimer) {
  dots[current].classList.remove('active');
  current = ((index % TOTAL) + TOTAL) % TOTAL;
  track.style.transform = 'translateX(-' + current * 100 + '%)';
  dots[current].classList.add('active');
  if (resetTimer) startTimer();
}

function startTimer() {
  clearInterval(timer);
  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    progressEl.style.transition = 'width 5s linear';
    progressEl.style.width = '100%';
  }));
  timer = setInterval(() => goTo(current + 1, true), 5000);
}

startTimer();

/* swipe */
const slider = document.getElementById('slider');
let tx = 0, ty = 0, swiping = false;

slider.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
  swiping = true;
}, { passive: true });

slider.addEventListener('touchmove', e => {
  if (!swiping) return;
  if (Math.abs(e.touches[0].clientX - tx) > Math.abs(e.touches[0].clientY - ty))
    e.preventDefault();
}, { passive: false });

slider.addEventListener('touchend', e => {
  if (!swiping) return;
  swiping = false;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > 42 && Math.abs(dx) > Math.abs(dy))
    goTo(current + (dx < 0 ? 1 : -1), true);
});
